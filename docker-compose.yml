services:
  postgres:
    image: postgres:16-alpine
    container_name: sw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse_dev_only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warehouse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  loader:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: student-warehouse:latest
    container_name: sw-loader
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-student_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse_dev_only}
    command: ["load-all"]
    restart: "no"

  metabase:
    image: metabase/metabase:v0.51.0
    container_name: sw-metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: h2
      MB_SITE_URL: http://localhost:3000
    volumes:
      - metabase-data:/metabase.db
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  metabase-data:
